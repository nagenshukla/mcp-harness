name: Release

# Publishes to PyPI when a version tag (v*) is pushed, using PyPI Trusted Publishing
# (OIDC) — no API tokens stored in the repo. Configure the trusted publisher once at
# https://pypi.org/manage/project/mcp-harness/settings/publishing/ (workflow: release.yml).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/mcp-harness/
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
